  <!-- Glowing A -->
  <text x="256" y="340" font-family="JetBrains Mono, Courier New, monospace" font-size="280" font-weight="900" text-anchor="middle" fill="#3b82f6" opacity="0.15" filter="url(#blur)">A</text>
  <text x="256" y="340" font-family="JetBrains Mono, Courier New, monospace" font-size="280" font-weight="900" text-anchor="middle" fill="#3b82f6">A</text>
