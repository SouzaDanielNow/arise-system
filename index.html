<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARISE SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              mono: ['"JetBrains Mono"', 'monospace'],
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              system: {
                blue: '#3b82f6',
                glow: '#60a5fa',
                dark: '#020617',
                panel: '#0f172a',
                border: '#1e293b'
              },
              shadow: {
                purple: '#8b5cf6',
                dark: '#2e1065'
              }
            },
            animation: {
              'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'bounce-in': 'bounce-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
              'fade-in': 'fade-in 0.4s ease-out forwards',
              'slide-up': 'slide-up 0.5s ease-out forwards',
              'slide-in-right': 'slide-in-right 0.4s ease-out forwards',
              'zoom-in': 'zoom-in 0.3s ease-out forwards',
            },
            keyframes: {
              'pulse-glow': {
                '0%, 100%': { opacity: 1, boxShadow: '0 0 10px #3b82f6' },
                '50%': { opacity: .5, boxShadow: '0 0 20px #60a5fa' },
              },
              'bounce-in': {
                '0%': { opacity: 0, transform: 'scale(0.8)' },
                '100%': { opacity: 1, transform: 'scale(1)' },
              },
              'fade-in': {
                '0%': { opacity: 0 },
                '100%': { opacity: 1 },
              },
              'slide-up': {
                '0%': { opacity: 0, transform: 'translateY(20px)' },
                '100%': { opacity: 1, transform: 'translateY(0)' },
              },
              'slide-in-right': {
                '0%': { opacity: 0, transform: 'translateX(20px)' },
                '100%': { opacity: 1, transform: 'translateX(0)' },
              },
              'zoom-in': {
                '0%': { opacity: 0, transform: 'scale(0.9)' },
                '100%': { opacity: 1, transform: 'scale(1)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      @property --rank-color {
        syntax: '<color>';
        inherits: true;
        initial-value: #9ca3af;
      }
      :root {
        --rank-color: #9ca3af;
        transition: --rank-color 1s ease;
      }
      body {
        background-color: #020617;
        color: #e2e8f0;
      }
      /* Custom Scrollbar for the System look */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a; 
      }
      ::-webkit-scrollbar-thumb {
        background: #3b82f6; 
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #60a5fa; 
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
